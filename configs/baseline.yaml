name: baseline
notes: >
  First reference experiment. DETR at the fixed 64-input setting with log-minmax target
  normalization and O(1) loss weights. Paths point at the small dev split (n=1..4, one file per
  count) for now; swap in the full cluster splits (data/full_1to4/) when training on the GPU.

data:
  # One file per compartment count, combined into a single dataset. Per-n files are what make
  # the count distribution exactly balanced rather than balanced only in expectation.
  train_path:
    - data/dev_1to4/n1/train.parquet
    - data/dev_1to4/n2/train.parquet
    - data/dev_1to4/n3/train.parquet
    - data/dev_1to4/n4/train.parquet
  val_path:
    - data/dev_1to4/n1/val.parquet
    - data/dev_1to4/n2/val.parquet
    - data/dev_1to4/n3/val.parquet
    - data/dev_1to4/n4/val.parquet
  test_path:
    - data/dev_1to4/n1/test.parquet
    - data/dev_1to4/n2/test.parquet
    - data/dev_1to4/n3/test.parquet
    - data/dev_1to4/n4/test.parquet
  n_inputs: 64
  train_limit_per_path: null
  # No max_comp: the compartment-table width is read off the data's columns.
  normalization: log_minmax
  # Matched to the generator's sampling ranges — a mismatch clamps real targets.
  t1_min: 50.0
  t1_max: 4000.0
  t2_min: 5.0
  t2_max: 3000.0
  signal_norm: max

model:
  input_dim: 64
  hidden_dim: 512
  fs_dim: 256
  n_queries: 10
  n_dlayers: 4
  n_heads: 4
  aux_loss: false
  pretrain_path: null
  freeze_encoder: false

loss:
  t1_weight: 1.0
  t2_weight: 1.0
  w_weight: 1.0
  exist_weight: 0.1
  aux_weight: 1.0
  signal_consistency: false
  signal_consistency_weight: 0.0
  signal_consistency_type: mse

train:
  epochs: 200           # an upper bound only — early stopping decides when to stop
  batch_size: 256
  lr: 1.0e-4            # constant: no scheduler in the first baseline
  weight_decay: 1.0e-4
  opt_betas: [0.9, 0.98]
  early_stopping: true
  early_stopping_patience: 10
  early_stopping_min_delta: 1.0e-4
  device: null          # auto-detect cuda > mps > cpu
  seed: 0
  num_workers: 0
  ckpt_every: 1         # every epoch: keeps last.pt's history complete across a resume
