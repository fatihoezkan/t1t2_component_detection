name: cluster_baseline
notes: >
  Full-scale 64-input baseline for the GPU cluster. Same architecture and log-minmax
  normalization as configs/baseline.yaml, but pointed at the 1M-voxel data/full/ splits with a
  GPU-sized batch and a real epoch budget. Generate data/full/ first (slurm/gen_data.slurm).

data:
  train_path: data/full/train.parquet
  val_path: data/full/val.parquet
  test_path: data/full/test.parquet
  n_inputs: 64
  max_comp: 3
  normalization: log_minmax
  t1_min: 100.0
  t1_max: 7000.0
  t2_min: 5.0
  t2_max: 4000.0
  signal_norm: none

model:
  input_dim: 64
  hidden_dim: 512
  fs_dim: 256
  n_queries: 10
  n_dlayers: 4
  n_heads: 4
  aux_loss: false
  pretrain_path: null
  freeze_encoder: false

loss:
  t1_weight: 1.0
  t2_weight: 1.0
  w_weight: 1.0
  exist_weight: 0.1
  aux_weight: 1.0
  signal_consistency: false
  signal_consistency_weight: 0.0
  signal_consistency_type: mse

train:
  epochs: 200
  batch_size: 512
  lr: 1.0e-4
  lr_step: 1000
  weight_decay: 1.0e-4
  opt_betas: [0.9, 0.98]
  device: null        # auto-detect -> cuda on the GPU node
  seed: 0
  num_workers: 4
  ckpt_every: 10
